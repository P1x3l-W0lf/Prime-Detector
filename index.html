<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Prime Detector</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
<div id="wrapper">
    <div id="content">
        <h1>Prime Detector</h1>

        <p>Input as many numbers less than 9000000000000000 as you'd like and see how many of them are prime.</p>

        <input type="text" placeholder="Enter your number(s)" id="input">
        <button id="submit" onclick="check()">Submit</button>

        <h3 id="output"></h3>
    </div>
</div>
</body>
</html>
